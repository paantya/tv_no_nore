global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/alerts.yml"

scrape_configs:
  - job_name: 'mtg'
    metrics_path: '/'
    static_configs:
      - targets: ['mtg_1:3129']
        labels:
          alias: 'mtg_1'
          env: 'prod'
      - targets: ['mtg_2:3129']
        labels:
          alias: 'mtg_2'
          env: 'prod'
      - targets: ['mtg_3:3129']
        labels:
          alias: 'mtg_3'
          env: 'prod'
